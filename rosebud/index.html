<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDisorder v5.0 — Phase 2 Multi-Arcade</title>
  <meta name="description" content="SkyDisorder: A satirical arcade-style golf game that parodies startup culture. Upload your repos, play your code, experience the chaos." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0012;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      position: relative;
      width: 100%;
      max-width: 750px;
      padding: 14px;
      margin: 0 auto;
    }
    /* Hidden file input */
    #repoUpload {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
  </style>

<style>
    #rosebud-exported-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 1;
        transition: opacity 500ms ease-in-out;
    }

    #rosebud-exported-splash.is-hiding {
        opacity: 0;
    }

    #rosebud-exported-splash .rosebud-exported-splash__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #rosebud-exported-splash .rosebud-exported-splash__logo {
        width: 100px;
        height: 100px;
        animation: rosebud-exported-splash-breathe 2.4s ease-in-out infinite;
    }

    #rosebud-exported-splash .rosebud-exported-splash__text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 16px;
        line-height: 1.25;
        letter-spacing: 0.06em;
    }

    #rosebud-exported-splash .rosebud-exported-splash__text strong {
        font-weight: 700;
    }

    #rosebud-exported-splash .rosebud-exported-splash__text span:last-child {
        opacity: 0.88;
    }

    @keyframes rosebud-exported-splash-breathe {
        0%,
        100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
    }
</style></head>
<body>
<div id="rosebud-exported-splash" aria-live="polite">
    <div class="rosebud-exported-splash__content">
        <img
            class="rosebud-exported-splash__logo"
            src="__rosebud/rosebud-icon.png"
            alt="Rosebud Logo"
            width="100"
            height="100"
        />
        <div class="rosebud-exported-splash__text" aria-label="Rosebud.AI Make Games">
            <strong>Rosebud.AI</strong>
            <span>Make Games</span>
        </div>
    </div>
</div>
  <div id="game"></div>
  <input type="file" id="repoUpload" webkitdirectory directory multiple accept=".zip,.txt,*/*" />
  <script src="./main.js" defer></script>

<script>
    (() => {
        const splashRoot = document.getElementById('rosebud-exported-splash');
        if (!splashRoot) return;

        let isReady = false;
        let isMinimumVisibleTimeElapsed = false;
        let isHidden = false;

        const maybeHideSplash = () => {
            if (isHidden || !isReady || !isMinimumVisibleTimeElapsed) return;

            isHidden = true;
            splashRoot.classList.add('is-hiding');
            window.setTimeout(() => splashRoot.remove(), 500);
        };

        const markReady = () => {
            isReady = true;
            maybeHideSplash();
        };

        window.setTimeout(() => {
            isMinimumVisibleTimeElapsed = true;
            maybeHideSplash();
        }, 1000);

        if (document.readyState === 'complete') {
            markReady();
        } else {
            window.addEventListener('load', markReady, { once: true });
        }

        
    })();
</script></body>
</html>
